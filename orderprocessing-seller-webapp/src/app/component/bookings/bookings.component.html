<p class="mx-5 mt-5 display-6 fw-bold">{{title}}</p>
<mat-tab-group mat-stretch-tabs="false" mat-align-tabs="start" dynamicHeight class="mt-5 mx-5">

  <mat-tab label="New Request" class="container">
    <div>
      <app-reusable-table [HeadArray]="columnArray" [DataArray]="bookingList" [Title]="title">
      </app-reusable-table>
    </div>

    <button mat-button (click)="loadMoreData()" class="load-more">Load More
    </button>
    <button mat-button (click)="loadLessData()" class="load-less">Load Less
    </button>
  </mat-tab>
  <mat-tab label="Approved Request" class="container">
    <div>
      <app-reusable-table [HeadArray]="columnArray" [DataArray]="bookingList" [Title]="title">
      </app-reusable-table>
    </div>

    <button mat-button (click)="loadMoreData()" class="load-more">Load More
    </button>
    <button mat-button (click)="loadLessData()" class="load-less">Load Less
    </button>
  </mat-tab>
</mat-tab-group>
